name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: camerooncompany_test
        ports: [3306:3306]
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, redis, bcmath, pcntl, posix
          coverage: xdebug

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-scripts

      - name: Copy .env
        run: cp .env.example .env.testing

      - name: Generate key
        run: php artisan key:generate --env=testing

      - name: Run migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: camerooncompany_test
          DB_USERNAME: root
          DB_PASSWORD: password
          QUEUE_CONNECTION: sync
          CACHE_STORE: array
          SESSION_DRIVER: array
        run: php artisan migrate --env=testing --force

      - name: Run Passport client setup
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: camerooncompany_test
          DB_USERNAME: root
          DB_PASSWORD: password
        run: php artisan passport:client --personal --name="CI Test Client" --no-interaction

      - name: Run tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: camerooncompany_test
          DB_USERNAME: root
          DB_PASSWORD: password
          QUEUE_CONNECTION: sync
          CACHE_STORE: array
          SESSION_DRIVER: array
        run: php artisan test --coverage-clover coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-scripts

      - name: Run Pint
        run: vendor/bin/pint --test
